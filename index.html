<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mickey Max | Strategic Operations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Public+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --agency-black: #0a0a0a; 
            --gold-accent: #b08e4d; /* Refined "Signature Gold" */
            --paper-white: #ffffff;
            --soft-gray: #f4f4f7;
        }
        body { 
            background-color: var(--paper-white); 
            color: var(--agency-black); 
            font-family: 'Public Sans', sans-serif; 
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.01em;
        }
        .serif-elite { font-family: 'Cormorant Garamond', serif; }
        
        /* The Mickey Max "Executive" Logo */
        .logo-box {
            border: 1.5px solid var(--agency-black);
            padding: 6px 14px;
            display: inline-block;
            background: #fff;
        }

        /* Safari-Style Glass Header */
        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        /* Availability Status */
        .status-pill {
            background: var(--soft-gray);
            border-radius: 100px;
            padding: 4px 12px;
            display: inline-flex;
            align-items: center;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .dot { height: 6px; width: 6px; background-color: #22c55e; border-radius: 50%; margin-right: 8px; }

        /* Advanced Signature Form */
        input, select, textarea {
            background: var(--soft-gray) !important;
            border: 1px solid transparent !important;
            border-radius: 0px !important; /* Sharp, professional corners */
            padding: 1.25rem !important;
            font-size: 17px !important; /* Safari Zoom Prevention */
            color: #000 !important;
            width: 100%;
            transition: all 0.3s ease;
        }
        input:focus { background: #fff !important; border-color: var(--gold-accent) !important; outline: none; }

        .btn-signature {
            background-color: var(--agency-black);
            color: #fff;
            padding: 1.25rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-size: 11px;
            transition: all 0.3s ease;
        }
        .btn-signature:active { transform: scale(0.98); background-color: var(--gold-accent); }

        .image-container { border: 1px solid rgba(0,0,0,0.05); filter: grayscale(100%); }
    </style>
</head>
